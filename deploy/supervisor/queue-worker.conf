[program:rig-queue]
process_name=%(program_name)s_%(process_num)02d
directory=/var/www/receipt-invoice-generator
command=php artisan queue:work redis --sleep=3 --tries=3 --timeout=120 --max-time=3600
autostart=true
autorestart=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/receipt-invoice-generator/storage/logs/queue-worker.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
stopwaitsecs=3600
stopsignal=TERM
