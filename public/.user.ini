; PHP per-directory overrides for Laravel public/ entry point.
; PHP-FPM auto-picks up .user.ini files (default user_ini.filename).
; Restart not needed; refreshed every 5 minutes (default user_ini.cache_ttl=300).
;
; Tuned for artwork attachment uploads (PDF/PNG/JPG up to ~8 MB) so the
; previous "file failed to upload" error no longer fires for typical
; design-proof files.

upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20
memory_limit = 256M
max_execution_time = 60
